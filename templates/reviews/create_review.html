{% extends 'base.html' %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1 class="mb-4">
            Залишити відгук
        </h1>

        <p class="text-muted">
            {{ hotel.name }}
        </p>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary w-100">

                Опублікувати відгук

            </button>

        </form>

    </div>

</div>

{% endblock %}
